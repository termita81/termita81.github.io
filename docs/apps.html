<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Apps - My Blog</title>
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="theme-color" content="#0066cc">
  <script>
    // Apply theme immediately to prevent flash
    (function() {
      const savedTheme = localStorage.getItem('site-theme')

      // Handle the three modes: 'light', 'dark', or 'system'
      if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme')
      } else if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark-theme')
      }
      // If savedTheme is 'system' or null, don't add any class
      // CSS will use the prefers-color-scheme media query
    })()
  </script>
</head>
<body>
  <header class="site-header">
    <nav class="site-nav">
      <a href="/" class="nav-link">Home</a>
      <a href="/apps.html" class="nav-link">Apps</a>
      <a href="/about.html" class="nav-link">About</a>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
        <span class="theme-icon">◐</span>
      </button>
    </nav>
  </header>

  <main class="site-main">
    <div class="apps">
	<div id="update-banner" style="display: none;">
		<p>Update available!</p>
		<button id="reload-btn">Reload to update</button>
	</div>
	
	<h1>Apps</h1>
	<p>My personal applications and tools.</p>
	
	<div id="apps-container">
		<div class="loading">
			<p>Loading apps...</p>
	</div>
</div>

<script>
(function () {
	let installedApps = {}
	let latestVersions = {}

	function newerThan(a, b) {
		return a.split('_').map(n => parseInt(n)).join('.') > b.split('_').map(n => parseInt(n)).join('.')
	}

	function render() {
		const container = document.getElementById('apps-container')
		container.innerHTML = ''

		Object.entries(latestVersions).forEach(([name, info]) => {
			const installed = installedApps[name]
			const isOutdated = installed && newerThan(info.latestVersion, installed)
			const isInstalled = !!installed

			const appEl = document.createElement('div')
			appEl.className = `app-item ${isInstalled ? 'installed' : ''} ${isOutdated ? 'update-available' : ''}`
			appEl.innerHTML = `
				<div class="app-info">
					<h2>${name.charAt(0).toUpperCase() + name.slice(1)}</h2>
					<p class="version">${isInstalled ? 'v' + installedApps[name] : 'Not installed'} v${info.latestVersion}</p>
					<p class="size">${info.latestSize} bytes</p>
				</div>
				<button class="app-btn ${isInstalled ? 'uninstall' : ''}" data-action="${isInstalled ? 'uninstall' : 'install'}" data-app="${name}">
					${isInstalled ? 'Uninstall' : 'Install'}
				</button>
			`

			appEl.querySelector('.app-btn').addEventListener('click', function () {
				const app = this.dataset.app
				const action = this.dataset.action
				handleAction(action, app)
			})

			container.appendChild(appEl)
		})
	}

	function showAppUpdates(updates) {
		const banner = document.getElementById('update-banner')
		if (!Object.keys(updates).length) {
			banner.style.display = 'none'
			return
		}

		banner.innerHTML = `<p>Updates available for: ${Object.keys(updates).join(', ')}!</p>`
		banner.style.display = 'block'
	}

	function handleAction(action, app) {
		const port = navigator.serviceWorker.controller
		if (!port) return

		if (action === 'install') {
			port.postMessage({
				type: 'INSTALL_APP',
				appName: app,
				version: latestVersions[app].latestVersion
			})
		} else if (action === 'uninstall') {
			port.postMessage({ type: 'UNINSTALL_APP', appName: app })
		}
	}

	function refreshAppList() {
		installedApps = JSON.parse(localStorage.getItem('installedApps') || '{}')
		render()
	}

	const updateBtn = document.getElementById('reload-btn')
	if (updateBtn) {
		updateBtn.addEventListener('click', () => {
			window.location.reload()
		})
	}

	fetch('/apps/versions.json')
		.then(response => response.json())
		.then(versions => {
			latestVersions = versions
			installedApps = JSON.parse(localStorage.getItem('installedApps') || '{}')
			render()
		})

	render()

	if (navigator.serviceWorker) {
		navigator.serviceWorker.addEventListener('message', function (event) {
			if (event.data && event.data.type === 'APPS_UPDATED') {
				showAppUpdates(event.data.updates)
			}
			if (event.data && event.data.type === 'INSTALL_COMPLETE') {
				refreshAppList()
			}
			if (event.data && event.data.type === 'UNINSTALL_COMPLETE') {
				refreshAppList()
			}
		})

		const checkInterval = setInterval(() => {
			if (!navigator.serviceWorker) return
			navigator.serviceWorker.ready.then(registration => {
				registration.active.postMessage({ type: 'CHECK_VERSIONS' })
			})
		}, 60000)
	}
})()
</script>

<p>Built at 2026-04-02T12:06:44.670Z</p>
</div>

  </main>

  <script src="/scripts/theme.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(function(registration) {
          console.log('Service Worker registered with scope:', registration.scope)
        })
        .catch(function(error) {
          console.log('Service Worker registration failed:', error)
        })
    }
  </script>
</body>
</html>
