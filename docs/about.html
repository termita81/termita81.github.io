<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="color-scheme" content="light dark" />
		<title>About - My Blog</title>
		<link rel="stylesheet" href="/styles/main.css" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="apple-touch-icon" href="/icons/icon-192.png" />
		<meta name="theme-color" content="#0066cc" />
		<script>
			// Apply theme immediately to prevent flash
			;(function () {
				const savedTheme = localStorage.getItem('site-theme')

				// Handle the three modes: 'light', 'dark', or 'system'
				if (savedTheme === 'light') {
					document.documentElement.classList.add('light-theme')
				} else if (savedTheme === 'dark') {
					document.documentElement.classList.add('dark-theme')
				}
				// If savedTheme is 'system' or null, don't add any class
				// CSS will use the prefers-color-scheme media query
			})()
		</script>
	</head>

	<body>
		<header class="site-header">
			<nav class="site-nav">
				<a href="/" class="nav-link">Home</a>
				<a href="/apps.html" class="nav-link">Apps</a>
				<a href="/about.html" class="nav-link">About</a>
				<button
					id="theme-toggle"
					class="theme-toggle"
					aria-label="Toggle theme"
				>
					<span class="theme-icon">◐</span>
				</button>
			</nav>
		</header>

		<main class="site-main"><div class="about">
	<h1>About</h1>
	<p>
		Welcome to my blog! This is where I share my thoughts, ideas, and projects.
	</p>
	<p>
		Feel free to browse through the articles and reach out if you'd like to
		connect.
	</p>
</div>
</main>

		<script src="/scripts/theme.js"></script>
		<script src="/installServiceWorker.js"></script>

		<footer class="site-footer">
			<p>Built at 2026-04-07T08:52:09.357Z</p>
		</footer>
	</body>
</html>
